version: "3"

vars:
  DIST_DIR: dist

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task --list

  build:
    desc: Build the termvis binary
    sources:
      - "*.go"
      - go.mod
      - go.sum
    generates:
      - ./termvis
    cmds:
      - go build -o termvis .

  install:
    desc: Install termvis to $GOBIN (or $GOPATH/bin)
    cmds:
      - go install .

  test:
    desc: Run tests
    cmds:
      - go test ./...

  vet:
    desc: Vet
    cmds:
      - go vet ./...

  check:
    desc: Vet and test
    deps:
      - vet
      - test

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f termvis
      - rm -rf {{.DIST_DIR}}

  release:check:
    desc: Validate the .goreleaser.yaml config
    cmds:
      - goreleaser check

  release:snapshot:
    desc: Build a local snapshot release with GoReleaser (no publish, no tag needed)
    deps:
      - clean
    cmds:
      - goreleaser release --snapshot --clean

  release:
    desc: Cut a real release with GoReleaser (requires GITHUB_TOKEN and a pushed tag)
    deps:
      - clean
    cmds:
      - goreleaser release --clean
